<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - EventSpark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    .contact-hero { height: 260px; background: linear-gradient(rgba(0,0,0,0.52),rgba(0,0,0,0.52)), url('homebac.jpeg') center/cover no-repeat; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; margin-top: 92px; }
    .contact-hero h1 { font-family: Cooper, serif; font-size: 3rem; margin-bottom: 0.5rem; animation: fadeUp 0.8s ease-out both; }
    .contact-hero p  { font-family: Cambria Math, serif; font-size: 1.1rem; opacity: 0; animation: fadeUp 0.8s ease-out 0.2s both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    .contact-container { max-width: 1500px; margin: 100px 100px 55px;background: rgba(255,255,255,0.97); padding: 2.5rem 3rem; border-radius: 14px; box-shadow: 0 4px 20px rgba(26,54,93,0.1); border: 1px solid #e8edf5; animation: fadeUp 0.9s ease-out 0.3s both; }
    .contact-container h1{ font-family: Cambria Math, serif; font-size: 3rem; line-height: 1.7; color: #718096; text-align: center; margin-bottom: 2.5rem; }
    .contact-container > p { font-family: Cambria Math, serif; font-size: 1rem; line-height: 1.7; color: #718096; text-align: center; margin-bottom: 2.5rem; }
    .contact-content { display: flex; gap: 3rem; align-items: flex-start; }

    .contact-info { flex: 1; }
    .contact-info h3 { font-family: Cooper, serif; font-size: 1.4rem; color: #1a365d; margin-bottom: 1.5rem; }
    .info-item { display: flex; align-items: flex-start; gap: 0.9rem; margin-bottom: 1.2rem; padding: 1rem; background: #f7f8fc; border-radius: 10px; border: 1px solid #e8edf5; }
    .info-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
    .info-text span { display: block; font-weight: 700; color: #1a365d; font-size: 0.82rem; font-family: Arial, sans-serif; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .info-text p, .info-text a { font-family: Cambria Math, serif; font-size: 0.95rem; color: #4a5568; text-decoration: none; }
    .info-text a:hover { color: #2b6cb0; text-decoration: underline; }

    .contact-form { flex: 1; }
    .contact-form h3 { font-family: Cooper, serif; font-size: 1.4rem; color: #1a365d; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-family: Cambria Math, serif; font-size: 0.875rem; font-weight: 600; color: #4a5568; margin-bottom: 0.4rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.95rem; font-family: Cambria Math, serif; outline: none; transition: border-color 0.3s, box-shadow 0.3s; background: #fafbfc; }
    .form-group input:focus, .form-group textarea:focus { border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(43,108,176,0.1); background: white; }
    .form-group textarea { height: 110px; resize: vertical; }
    .submit-btn { width: 100%; padding: 0.8rem; background: #1a365d; color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; font-family: Cambria Math, serif; cursor: pointer; transition: background 0.3s; margin-top: 0.3rem; }
    .submit-btn:hover { background: #2b6cb0; }

    #toast { position: fixed; bottom: 28px; right: 28px; padding: 1rem 1.5rem; border-radius: 10px; font-family: Cambria Math, serif; font-size: 0.95rem; font-weight: 600; z-index: 999; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .toast-success { background: #f0fff4; color: #276749; border-left: 4px solid #38a169; }

    footer { text-align: center; padding: 1.2rem; background: #f1f1f1; font-size: 0.875rem; color: #718096; }
    @media (max-width: 768px) { .contact-container { margin: 2rem 1rem 3rem; padding: 1.5rem; } .contact-content { flex-direction: column; gap: 2rem; } .contact-hero h1 { font-size: 2rem; } }
  </style>
</head>
<body>

  <script src="header.js"></script>


  <div class="contact-container">
    <h1>Contact us</h1>
    <p>If you have any queries or suggestions regarding EventSpark, feel free to reach out. We're here to help!</p>
    <div class="contact-content">
      <div class="contact-info">
        <h3>Get In Touch</h3>
        <div class="info-item"><div class="info-icon">📧</div><div class="info-text"><span>Email</span><a href="mailto:eventspark@gmail.com">eventspark@gmail.com</a></div></div>
        <div class="info-item"><div class="info-icon">📞</div><div class="info-text"><span>Phone</span><p>+91 98765 43210</p></div></div>
        <div class="info-item"><div class="info-icon">🏫</div><div class="info-text"><span>Developed By</span><p>Team EventSpark</p></div></div>
       
      </div>
      <div class="contact-form">
        <h3>Send Us a Message</h3>
        <form id="contact-form">
          <div class="form-group"><label>Name</label><input type="text" name="name" placeholder="Your full name" required></div>
          <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="you@example.com" required></div>
          <div class="form-group"><label>Subject</label><input type="text" name="subject" placeholder="What is this about?" required></div>
          <div class="form-group"><label>Message</label><textarea name="message" placeholder="Write your message here..." required></textarea></div>
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <footer>&copy; 2026 EventSpark. All rights reserved.</footer>
  <div id="toast"></div>

  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const t = document.getElementById('toast');
      t.textContent = '✅ Message sent! We will get back to you soon.';
      t.className = 'toast-success';
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3500);
      this.reset();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - EventSpark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f4f8; min-height: 100vh; }
        nav {
            background: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: fixed; top: 0; width: 100%; z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo img { height: 55px; }
        .logo span { font-size: 2rem; font-weight: bold; color: #1a365d; font-family: News706 BT; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: #4a5568; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #2b6cb0; }
        .user-badge { padding: 6px 14px; background: #ebf8ff; color: #2b6cb0; border-radius: 20px; font-weight: 600; font-size: 0.85rem; }
        .logout-link { color: #e53e3e !important; }

        .main { padding: 90px 2rem 2rem; max-width: 1200px; margin: 0 auto; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 2rem; color: #1a365d; }
        .page-header p { color: #718096; margin-top: 4px; }

        .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 18px; border: 2px solid #e2e8f0;
            border-radius: 20px; background: white; cursor: pointer;
            font-size: 0.9rem; color: #4a5568; transition: all 0.2s;
        }
        .filter-btn.active { border-color: #2b6cb0; background: #2b6cb0; color: white; }
        .search-bar {
            margin-left: auto; padding: 8px 16px; border: 1px solid #e2e8f0;
            border-radius: 20px; font-size: 0.9rem; width: 240px; outline: none;
        }
        .search-bar:focus { border-color: #2b6cb0; }

        .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .event-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
        }
        .event-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .card-banner {
            height: 8px;
            background: linear-gradient(90deg, #2b6cb0, #63b3ed);
        }
        .card-banner.weddings  { background: linear-gradient(90deg, #d53f8c, #f687b3); }
        .card-banner.corporate { background: linear-gradient(90deg, #2b6cb0, #63b3ed); }
        .card-banner.concerts  { background: linear-gradient(90deg, #6b46c1, #b794f4); }
        .card-banner.social    { background: linear-gradient(90deg, #276749, #68d391); }
        .card-banner.sports    { background: linear-gradient(90deg, #c05621, #f6ad55); }

        .card-body { padding: 1.3rem; }
        .card-category { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #718096; margin-bottom: 6px; }
        .card-title { font-size: 1.2rem; font-weight: 700; color: #1a365d; margin-bottom: 10px; }
        .card-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .card-meta span { font-size: 0.875rem; color: #4a5568; }
        .card-price { font-size: 1.25rem; font-weight: 700; color: #2b6cb0; margin-bottom: 12px; }
        .card-seats { font-size: 0.8rem; color: #718096; margin-bottom: 14px; }
        .seats-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin-top: 4px; }
        .seats-fill { height: 100%; border-radius: 3px; background: #2b6cb0; }
        .book-btn {
            width: 100%; padding: 11px; background: #2b6cb0; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600;
            transition: background 0.2s;
        }
        .book-btn:hover { background: #2c5282; }
        .book-btn:disabled { background: #a0aec0; cursor: not-allowed; }

        /* Booking Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; padding: 2rem; border-radius: 12px; width: 420px; }
        .modal h3 { font-size: 1.4rem; color: #1a365d; margin-bottom: 1.5rem; }
        .modal-info p { font-size: 0.9rem; color: #4a5568; margin-bottom: 6px; }
        .modal-price { font-size: 1.5rem; font-weight: 700; color: #2b6cb0; margin: 1rem 0; }
        .seats-input { display: flex; align-items: center; gap: 12px; margin: 1rem 0; }
        .seats-input label { font-weight: 600; color: #4a5568; }
        .seats-input input { width: 70px; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; text-align: center; }
        .modal-btns { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .btn-confirm { flex: 1; padding: 12px; background: #2b6cb0; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; }
        .btn-cancel  { flex: 1; padding: 12px; background: #e2e8f0; color: #4a5568; border: none; border-radius: 8px; cursor: pointer; }
        .btn-confirm:hover { background: #2c5282; }

        #msg { position: fixed; bottom: 20px; right: 20px; padding: 14px 22px; border-radius: 10px; font-weight: 600; z-index: 200; display: none; }
        .msg-success { background: #c6f6d5; color: #276749; }
        .msg-error   { background: #fed7d7; color: #c53030; }

        .empty-state { text-align: center; padding: 4rem; color: #a0aec0; grid-column: 1/-1; }
        .my-bookings-link { display: inline-block; margin-top: 1.5rem; padding: 10px 22px; background: #2b6cb0; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<nav>
    <div class="logo"><img src="logo.jpg" alt="Logo"><span>EventSpark</span></div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="event.html">Events</a>
        <a href="about_us.html">About Us</a>
        <a href="contact.html">Contact</a>
        <span id="nav-user"></span>
    </div>
</nav>

<div class="main">
    <div class="page-header">
        <h1>Upcoming Events</h1>
        <p>Discover and book amazing events near you</p>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterEvents('all', this)">All</button>
        <button class="filter-btn" onclick="filterEvents('weddings', this)">💍 Weddings</button>
        <button class="filter-btn" onclick="filterEvents('corporate', this)">💼 Corporate</button>
        <button class="filter-btn" onclick="filterEvents('concerts', this)">🎵 Concerts</button>
        <button class="filter-btn" onclick="filterEvents('social', this)">🎉 Social</button>
        <button class="filter-btn" onclick="filterEvents('sports', this)">⚽ Sports</button>
        <input type="text" class="search-bar" id="search-bar" placeholder="🔍 Search events..." oninput="searchEvents()">
    </div>

    <div class="events-grid" id="events-grid">
        <div class="empty-state"><p>Loading events...</p></div>
    </div>
</div>

<!-- Booking Modal -->
<div class="modal-overlay" id="book-modal">
    <div class="modal">
        <h3>Book Event</h3>
        <div class="modal-info">
            <p><strong id="m-title"></strong></p>
            <p>📍 <span id="m-venue"></span></p>
            <p>📅 <span id="m-date"></span></p>
        </div>
        <div class="modal-price" id="m-price"></div>
        <div class="seats-input">
            <label>Seats:</label>
            <input type="number" id="m-seats" value="1" min="1" max="10" onchange="updateTotal()">
            <span id="m-total" style="font-weight:700;color:#2b6cb0"></span>
        </div>
        <div class="modal-btns">
            <button class="btn-confirm" onclick="confirmBooking()">Confirm Booking</button>
            <button class="btn-cancel"  onclick="closeBookModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="msg"></div>

<script>
    let allEvents = [];
    let currentFilter = 'all';
    let selectedEvent = null;
    let isLoggedIn = false;
    let userRole = '';

    function showMsg(text, type = 'success') {
        const m = document.getElementById('msg');
        m.textContent = text;
        m.className = type === 'success' ? 'msg-success' : 'msg-error';
        m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 3500);
    }

    async function loadSession() {
        const res  = await fetch('/session-info');
        const data = await res.json();
        isLoggedIn = data.loggedIn;
        userRole   = data.loggedIn ? data.user.role : '';
        const navUser = document.getElementById('nav-user');
        if (data.loggedIn) {
            navUser.innerHTML = `<span class="user-badge">👤 ${data.user.name}</span>
                <a href="/my-bookings-page.html">My Bookings</a>
                <a href="/logout" class="logout-link">Logout</a>`;
        } else {
            navUser.innerHTML = `<a href="finallogin.html" style="background:#2b6cb0;color:white;padding:7px 16px;border-radius:8px;font-weight:600">Login</a>`;
        }
    }

    async function loadEvents(category = 'all', search = '') {
        let url = '/events?';
        if (category !== 'all') url += `category=${category}&`;
        if (search) url += `search=${encodeURIComponent(search)}`;

        const res  = await fetch(url);
        const data = await res.json();
        allEvents  = data.events || [];
        renderEvents(allEvents);
    }

    function renderEvents(events) {
        const grid = document.getElementById('events-grid');
        if (!events.length) {
            grid.innerHTML = '<div class="empty-state"><p>No events found.</p></div>';
            return;
        }
        grid.innerHTML = events.map(e => {
            const pct = Math.round((e.available_seats / e.total_seats) * 100);
            const soldOut = e.available_seats === 0;
            return `
            <div class="event-card">
                <div class="card-banner ${e.category}"></div>
                <div class="card-body">
                    <div class="card-category">${e.category}</div>
                    <div class="card-title">${e.title}</div>
                    <div class="card-meta">
                        <span>📅 ${new Date(e.event_date).toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})} &nbsp; ⏰ ${e.event_time}</span>
                        <span>📍 ${e.venue}</span>
                        <span>🏢 ${e.manager_name}${e.company ? ' · '+e.company : ''}</span>
                    </div>
                    <div class="card-price">₹${parseFloat(e.price).toLocaleString('en-IN')} <span style="font-size:0.85rem;font-weight:400;color:#718096">/ seat</span></div>
                    <div class="card-seats">
                        ${soldOut ? '🔴 Sold Out' : `🟢 ${e.available_seats} of ${e.total_seats} seats available`}
                        <div class="seats-bar"><div class="seats-fill" style="width:${pct}%"></div></div>
                    </div>
                    <button class="book-btn" ${soldOut ? 'disabled' : ''} onclick="openBookModal(${JSON.stringify(e).replace(/"/g,'&quot;')})">
                        ${soldOut ? 'Sold Out' : 'Book Now'}
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function filterEvents(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadEvents(cat, document.getElementById('search-bar').value);
    }

    let searchTimer;
    function searchEvents() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            loadEvents(currentFilter, document.getElementById('search-bar').value);
        }, 350);
    }

    function openBookModal(event) {
        if (!isLoggedIn) {
            if (confirm('Please login to book events. Go to login page?'))
                window.location = '/finallogin.html';
            return;
        }
        if (userRole !== 'customer') {
            showMsg('Only customers can book events.', 'error'); return;
        }
        selectedEvent = event;
        document.getElementById('m-title').textContent = event.title;
        document.getElementById('m-venue').textContent = event.venue;
        document.getElementById('m-date').textContent  = new Date(event.event_date).toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'}) + ' · ' + event.event_time;
        document.getElementById('m-price').textContent = '₹' + parseFloat(event.price).toLocaleString('en-IN') + ' / seat';
        document.getElementById('m-seats').max = Math.min(10, event.available_seats);
        document.getElementById('m-seats').value = 1;
        updateTotal();
        document.getElementById('book-modal').classList.add('active');
    }

    function updateTotal() {
        if (!selectedEvent) return;
        const seats = parseInt(document.getElementById('m-seats').value) || 1;
        const total = seats * parseFloat(selectedEvent.price);
        document.getElementById('m-total').textContent = '= ₹' + total.toLocaleString('en-IN');
    }

    function closeBookModal() { document.getElementById('book-modal').classList.remove('active'); }

    async function confirmBooking() {
        const seats = parseInt(document.getElementById('m-seats').value) || 1;
        const res  = await fetch('/book', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event_id: selectedEvent.event_id, seats_booked: seats })
        });
        const data = await res.json();
        if (data.success) {
            showMsg(`🎉 Booked ${seats} seat(s)! Total: ₹${data.total_amount.toLocaleString('en-IN')}`);
            closeBookModal();
            loadEvents(currentFilter, document.getElementById('search-bar').value);
        } else {
            showMsg(data.message || 'Booking failed.', 'error');
        }
    }

    loadSession().then(() => loadEvents());
</script>
</body>
</html>

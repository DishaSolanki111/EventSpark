<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventSpark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-image: url('homebac.jpeg'); background-size: cover; background-position: center; background-repeat: no-repeat; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        body::before { content: ""; position: fixed; inset: 0; background: rgba(255,255,255,0.3); z-index: 0; }
        .login-box { position: relative; z-index: 1; width: 400px; background: rgba(255,255,255,0.82); backdrop-filter: blur(6px); border-radius: 16px; padding: 2.5rem 2.2rem; box-shadow: 0 12px 40px rgba(26,54,93,0.18); margin-top: 92px; animation: fadeUp 0.7s ease-out both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
        .login-box h1 { font-family: Cooper, serif; font-size: 2.2rem; color: #1a365d; text-align: center; margin-bottom: 0.4rem; }
        .subtitle { text-align: center; font-family: Cambria Math, serif; color: #718096; font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.3rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; color: #4a5568; margin-bottom: 0.4rem; font-family: Cambria Math, serif; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 1rem; font-family: Cambria Math, serif; background: rgba(255,255,255,0.9); outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
        .form-group input:focus { border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(43,108,176,0.12); }
        .role-hint { font-size: 0.78rem; color: #a0aec0; font-family: Arial, sans-serif; margin-top: 4px; }
        .submit-btn { width: 100%; padding: 0.8rem; background: #1a365d; color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; font-family: Cambria Math, serif; cursor: pointer; transition: background 0.3s; margin-top: 0.5rem; }
        .submit-btn:hover { background: #2b6cb0; }
        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.4rem 0; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
        .divider span { font-size: 0.8rem; color: #a0aec0; }
        .signup-link { text-align: center; font-family: Cambria Math, serif; color: #718096; font-size: 0.9rem; }
        .signup-link a { color: #2b6cb0; text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <script src="header.js"></script>

    <div class="login-box">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your EventSpark account</p>
        <form action="http://localhost:5000/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="pass" placeholder="Enter your password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <input type="text" name="identity" placeholder="customer  or  manager" required>
                <div class="role-hint">Type exactly: <strong>customer</strong> or <strong>manager</strong></div>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>
        <div class="divider"><span>or</span></div>
        <p class="signup-link">Don't have an account? <a href="select_role.html">Sign up here</a></p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSpark - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('homebac.jpeg');
            background-size: cover;
            background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .hero-content { padding: 5rem; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; font-family: Cooper, serif; animation: slideUp 1s ease-out both; }
        .hero p  { font-size: 1.25rem; margin-bottom: 2rem; font-family: Cambria Math, serif; animation: slideUp 1s ease-out 0.2s both; opacity: 0; }
        .cta-btn {
            padding: 1rem 2rem; font-size: 1.1rem;
            background: #2b6cb0; color: white;
            border: none; border-radius: 0.5rem; cursor: pointer;
            text-decoration: none; display: inline-block;
            transition: background 0.3s, transform 0.3s;
            animation: slideUp 1s ease-out 0.4s both; opacity: 0;
            font-family: Cambria Math, serif; font-weight: 600;
        }
        .cta-btn:hover { background: #276749; transform: scale(1.05); }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @media (max-width: 768px) { .hero h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <script src="header.js"></script>

    <div class="hero">
        <div class="hero-content">
            <h1>Create Unforgettable Events</h1>
            <p>Your premier partner in event management excellence</p>
            <a class="cta-btn" href="event.html">Get Started</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - EventSpark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f4f8; min-height: 100vh; }
        nav {
            background: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: fixed; top: 0; width: 100%; z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo img { height: 55px; }
        .logo span { font-size: 2rem; font-weight: bold; color: #1a365d; }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .nav-right a { text-decoration: none; color: #4a5568; font-weight: 500; }
        .logout-btn { padding: 8px 18px; background: #e53e3e; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .logout-btn:hover { background: #c53030; }
        .main { padding: 100px 2rem 2rem; max-width: 1100px; margin: 0 auto; }
        .welcome-card { background: linear-gradient(135deg, #1a365d, #2b6cb0); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .welcome-card h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .number { font-size: 2.5rem; font-weight: bold; color: #2b6cb0; }
        .stat-card .label { color: #718096; font-size: 0.9rem; margin-top: 4px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-header h3 { font-size: 1.4rem; color: #1a365d; }
        .create-btn { padding: 10px 22px; background: #2b6cb0; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
        .create-btn:hover { background: #2c5282; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; padding: 2rem; border-radius: 12px; width: 520px; max-height: 90vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 1.5rem; font-size: 1.4rem; color: #1a365d; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; color: #4a5568; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
        .form-group textarea { resize: vertical; height: 90px; }
        .modal-btns { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .btn-primary { flex: 1; padding: 11px; background: #2b6cb0; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .btn-cancel  { flex: 1; padding: 11px; background: #e2e8f0; color: #4a5568; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .event-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        .event-card-header { padding: 1.2rem 1.2rem 0.8rem; border-bottom: 1px solid #e2e8f0; }
        .event-card-header h4 { font-size: 1.1rem; color: #1a365d; margin-bottom: 4px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: capitalize; }
        .badge-upcoming  { background: #ebf8ff; color: #2b6cb0; }
        .badge-completed { background: #f0fff4; color: #276749; }
        .badge-cancelled { background: #fff5f5; color: #c53030; }
        .event-card-body { padding: 1rem 1.2rem; font-size: 0.9rem; color: #4a5568; }
        .event-card-body p { margin-bottom: 5px; }
        .event-card-footer { padding: 0.8rem 1.2rem; display: flex; gap: 0.5rem; border-top: 1px solid #e2e8f0; }
        .btn-sm { flex: 1; padding: 7px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-view   { background: #ebf8ff; color: #2b6cb0; }
        .btn-delete { background: #fff5f5; color: #c53030; }
        .empty-state { text-align: center; padding: 3rem; color: #a0aec0; grid-column: 1/-1; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f7fafc; padding: 12px 16px; text-align: left; font-size: 0.85rem; color: #4a5568; }
        td { padding: 12px 16px; border-top: 1px solid #e2e8f0; font-size: 0.9rem; color: #2d3748; }
        #msg { position: fixed; bottom: 20px; right: 20px; padding: 14px 22px; border-radius: 10px; font-weight: 600; z-index: 200; display: none; }
        .msg-success { background: #c6f6d5; color: #276749; }
        .msg-error   { background: #fed7d7; color: #c53030; }
    </style>
</head>
<body>
<nav>
    <div class="logo"><img src="logo.jpg" alt="Logo"><span>EventSpark</span></div>
    <div class="nav-right">
        <a href="home.html">Home</a>
        <button class="logout-btn" onclick="window.location='/logout'">Logout</button>
    </div>
</nav>

<div class="main">
    <div class="welcome-card">
        <h2 id="welcome-msg">Welcome back! 👋</h2>
        <p>Manage your events and track bookings from your dashboard.</p>
    </div>
    <div class="stats">
        <div class="stat-card"><div class="number" id="stat-total">0</div><div class="label">Total Events</div></div>
        <div class="stat-card"><div class="number" id="stat-upcoming">0</div><div class="label">Upcoming Events</div></div>
        <div class="stat-card"><div class="number" id="stat-bookings">0</div><div class="label">Seats Booked</div></div>
    </div>
    <div class="section-header">
        <h3>My Events</h3>
        <button class="create-btn" onclick="openModal()">+ Create New Event</button>
    </div>
    <div class="events-grid" id="events-grid">
        <div class="empty-state"><p>Loading events...</p></div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal" id="modal-inner">
        <h3>Create New Event</h3>
        <div class="form-group"><label>Event Title *</label><input type="text" id="f-title" placeholder="e.g. Grand Wedding Expo"></div>
        <div class="form-group"><label>Description</label><textarea id="f-desc" placeholder="Describe your event..."></textarea></div>
        <div class="form-group"><label>Category *</label>
            <select id="f-category">
                <option value="">Select Category</option>
                <option value="weddings">Weddings</option>
                <option value="corporate">Corporate Events</option>
                <option value="concerts">Concerts & Festivals</option>
                <option value="social">Social Gatherings</option>
                <option value="sports">Sports Events</option>
            </select>
        </div>
        <div class="form-group"><label>Venue *</label><input type="text" id="f-venue" placeholder="e.g. Grand Ballroom, Mumbai"></div>
        <div class="form-group"><label>Event Date *</label><input type="date" id="f-date"></div>
        <div class="form-group"><label>Event Time *</label><input type="time" id="f-time"></div>
        <div class="form-group"><label>Total Seats *</label><input type="number" id="f-seats" min="1" placeholder="e.g. 200"></div>
        <div class="form-group"><label>Price per Seat (₹) *</label><input type="number" id="f-price" min="0" step="0.01" placeholder="e.g. 499"></div>
        <div class="modal-btns">
            <button class="btn-primary" onclick="createEvent()">Create Event</button>
            <button class="btn-cancel"  onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="msg"></div>

<script>
    let myEvents = [];

    function showMsg(text, type = 'success') {
        const m = document.getElementById('msg');
        m.textContent = text;
        m.className = type === 'success' ? 'msg-success' : 'msg-error';
        m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 3000);
    }

    function openModal()  {
        document.getElementById('modal-inner').innerHTML = `
            <h3>Create New Event</h3>
            <div class="form-group"><label>Event Title *</label><input type="text" id="f-title" placeholder="e.g. Grand Wedding Expo"></div>
            <div class="form-group"><label>Description</label><textarea id="f-desc" placeholder="Describe your event..."></textarea></div>
            <div class="form-group"><label>Category *</label>
                <select id="f-category">
                    <option value="">Select Category</option>
                    <option value="weddings">Weddings</option>
                    <option value="corporate">Corporate Events</option>
                    <option value="concerts">Concerts & Festivals</option>
                    <option value="social">Social Gatherings</option>
                    <option value="sports">Sports Events</option>
                </select>
            </div>
            <div class="form-group"><label>Venue *</label><input type="text" id="f-venue"></div>
            <div class="form-group"><label>Event Date *</label><input type="date" id="f-date"></div>
            <div class="form-group"><label>Event Time *</label><input type="time" id="f-time"></div>
            <div class="form-group"><label>Total Seats *</label><input type="number" id="f-seats" min="1"></div>
            <div class="form-group"><label>Price per Seat (₹) *</label><input type="number" id="f-price" min="0" step="0.01"></div>
            <div class="modal-btns">
                <button class="btn-primary" onclick="createEvent()">Create Event</button>
                <button class="btn-cancel"  onclick="closeModal()">Cancel</button>
            </div>`;
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    async function loadSession() {
        const res = await fetch('/session-info');
        const data = await res.json();
        if (!data.loggedIn || data.user.role !== 'manager') {
            window.location = '/finallogin.html'; return;
        }
        document.getElementById('welcome-msg').textContent = `Welcome back, ${data.user.name}! 👋`;
    }

    async function loadEvents() {
        const res = await fetch('/my-events');
        const data = await res.json();
        if (!data.success) return;
        myEvents = data.events;
        document.getElementById('stat-total').textContent    = myEvents.length;
        document.getElementById('stat-upcoming').textContent = myEvents.filter(e => e.status === 'upcoming').length;
        document.getElementById('stat-bookings').textContent = myEvents.reduce((a, e) => a + (e.total_seats - e.available_seats), 0);
        renderEvents();
    }

    function renderEvents() {
        const grid = document.getElementById('events-grid');
        if (!myEvents.length) {
            grid.innerHTML = '<div class="empty-state"><p>No events yet. Create your first event!</p></div>';
            return;
        }
        grid.innerHTML = myEvents.map(e => `
            <div class="event-card">
                <div class="event-card-header">
                    <h4>${e.title}</h4>
                    <span class="badge badge-${e.status}">${e.status}</span>
                </div>
                <div class="event-card-body">
                    <p>📅 ${new Date(e.event_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})} &nbsp; ⏰ ${e.event_time}</p>
                    <p>📍 ${e.venue}</p>
                    <p>🎫 ${e.available_seats} / ${e.total_seats} seats</p>
                    <p>💰 ₹${parseFloat(e.price).toLocaleString('en-IN')}</p>
                </div>
                <div class="event-card-footer">
                    <button class="btn-sm btn-view"   onclick="viewBookings(${e.event_id},'${e.title.replace(/'/g,"\\'")}')">Bookings</button>
                    <button class="btn-sm btn-delete" onclick="deleteEvent(${e.event_id})">Delete</button>
                </div>
            </div>`).join('');
    }

    async function createEvent() {
        const payload = {
            title: document.getElementById('f-title').value.trim(),
            description: document.getElementById('f-desc').value.trim(),
            category: document.getElementById('f-category').value,
            venue: document.getElementById('f-venue').value.trim(),
            event_date: document.getElementById('f-date').value,
            event_time: document.getElementById('f-time').value,
            total_seats: document.getElementById('f-seats').value,
            price: document.getElementById('f-price').value
        };
        if (!payload.title || !payload.category || !payload.venue || !payload.event_date || !payload.event_time || !payload.total_seats || !payload.price)
            return showMsg('Please fill all required fields.', 'error');

        const res  = await fetch('/events/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.success) { showMsg('Event created!'); closeModal(); loadEvents(); }
        else showMsg(data.message || 'Failed.', 'error');
    }

    async function deleteEvent(id) {
        if (!confirm('Delete this event?')) return;
        const res  = await fetch(`/events/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) { showMsg('Event deleted.'); loadEvents(); }
        else showMsg(data.message || 'Error.', 'error');
    }

    async function viewBookings(event_id, title) {
        const res  = await fetch(`/event-bookings/${event_id}`);
        const data = await res.json();
        if (!data.success) return showMsg('Could not load bookings.', 'error');
        const rows = data.bookings.length
            ? data.bookings.map(b => `<tr><td>#${b.booking_id}</td><td>${b.customer_name}</td><td>${b.customer_email}</td><td>${b.seats_booked}</td><td>₹${parseFloat(b.total_amount).toLocaleString('en-IN')}</td><td><span class="badge badge-${b.booking_status}">${b.booking_status}</span></td></tr>`).join('')
            : '<tr><td colspan="6" style="text-align:center;color:#a0aec0">No bookings yet.</td></tr>';

        document.getElementById('modal-inner').innerHTML = `
            <h3>Bookings: ${title}</h3>
            <div style="overflow-x:auto;margin-top:1rem">
                <table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Seats</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody>${rows}</tbody></table>
            </div>
            <div class="modal-btns" style="margin-top:1rem">
                <button class="btn-cancel" style="flex:0;padding:10px 24px" onclick="closeModal();loadEvents()">Close</button>
            </div>`;
        document.getElementById('modal').classList.add('active');
    }

    loadSession();
    loadEvents();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - EventSpark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f4f8; min-height: 100vh; }
        nav { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: fixed; top: 0; width: 100%; z-index: 10; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo img { height: 55px; }
        .logo span { font-size: 2rem; font-weight: bold; color: #1a365d; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: #4a5568; font-weight: 500; }
        .logout-btn { padding: 8px 18px; background: #e53e3e; color: white; border: none; border-radius: 6px; cursor: pointer; }

        .main { padding: 90px 2rem 2rem; max-width: 900px; margin: 0 auto; }
        h1 { font-size: 2rem; color: #1a365d; margin-bottom: 1.5rem; }

        .booking-card {
            background: white; border-radius: 12px; padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.2rem;
            display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
        }
        .booking-info h3 { font-size: 1.1rem; color: #1a365d; margin-bottom: 6px; }
        .booking-info p { font-size: 0.9rem; color: #4a5568; margin-bottom: 4px; }
        .booking-right { text-align: right; min-width: 140px; }
        .amount { font-size: 1.3rem; font-weight: 700; color: #2b6cb0; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-top: 6px; }
        .badge-confirmed { background: #c6f6d5; color: #276749; }
        .badge-cancelled { background: #fed7d7; color: #c53030; }
        .badge-pending   { background: #fefcbf; color: #b7791f; }
        .cancel-btn { margin-top: 10px; padding: 7px 16px; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .cancel-btn:hover { background: #fed7d7; }

        .empty-state { text-align: center; padding: 4rem; color: #a0aec0; }
        #msg { position: fixed; bottom: 20px; right: 20px; padding: 14px 22px; border-radius: 10px; font-weight: 600; z-index: 200; display: none; }
        .msg-success { background: #c6f6d5; color: #276749; }
        .msg-error   { background: #fed7d7; color: #c53030; }
    </style>
</head>
<body>
<nav>
    <div class="logo"><img src="logo.jpg" alt="Logo"><span>EventSpark</span></div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="event.html">Events</a>
        <button class="logout-btn" onclick="window.location='/logout'">Logout</button>
    </div>
</nav>

<div class="main">
    <h1>My Bookings</h1>
    <div id="bookings-list"><div class="empty-state"><p>Loading...</p></div></div>
</div>

<div id="msg"></div>

<script>
    function showMsg(text, type='success') {
        const m = document.getElementById('msg');
        m.textContent = text; m.className = type==='success'?'msg-success':'msg-error';
        m.style.display = 'block'; setTimeout(()=>m.style.display='none',3000);
    }

    async function loadBookings() {
        const si = await fetch('/session-info'); const sd = await si.json();
        if (!sd.loggedIn || sd.user.role !== 'customer') { window.location='/finallogin.html'; return; }

        const res = await fetch('/my-bookings');
        const data = await res.json();
        const container = document.getElementById('bookings-list');

        if (!data.success || !data.bookings.length) {
            container.innerHTML = '<div class="empty-state"><p>No bookings yet. <a href="event.html" style="color:#2b6cb0">Browse Events →</a></p></div>';
            return;
        }

        container.innerHTML = data.bookings.map(b => `
            <div class="booking-card">
                <div class="booking-info">
                    <h3>${b.title}</h3>
                    <p>📍 ${b.venue}</p>
                    <p>📅 ${new Date(b.event_date).toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})} · ${b.event_time}</p>
                    <p>🎫 ${b.seats_booked} seat(s) · Booking #${b.booking_id}</p>
                    <p style="color:#a0aec0;font-size:0.8rem">Booked on ${new Date(b.booked_at).toLocaleDateString('en-IN')}</p>
                </div>
                <div class="booking-right">
                    <div class="amount">₹${parseFloat(b.total_amount).toLocaleString('en-IN')}</div>
                    <div class="badge badge-${b.booking_status}">${b.booking_status}</div>
                    ${b.booking_status === 'confirmed' ? `<br><button class="cancel-btn" onclick="cancelBooking(${b.booking_id})">Cancel</button>` : ''}
                </div>
            </div>`).join('');
    }

    async function cancelBooking(id) {
        if (!confirm('Cancel this booking?')) return;
        const res  = await fetch(`/bookings/${id}/cancel`, { method: 'PUT' });
        const data = await res.json();
        if (data.success) { showMsg('Booking cancelled.'); loadBookings(); }
        else showMsg(data.message || 'Error.', 'error');
    }

    loadBookings();
</script>
</body>
</html>

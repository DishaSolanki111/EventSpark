<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - EventSpark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
            font-family: Arial, sans-serif;
            min-height: 100vh;

            position: relative;
        }
        body::before {
            content: "";
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('homebac.jpeg');
            z-index: 0;
            pointer-events: none;
        }
        .page-hero, .main, #toast { position: relative; z-index: 1; }

        /* ── HERO ── */
        .page-hero {
            height: 200px;

            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; text-align: center;
            margin-top: 92px;
        }
        .page-hero h1 { font-family: Cooper, serif; font-size: 3rem; margin-bottom: 0.5rem; animation: fadeUp 0.8s ease-out both; }
        .page-hero p  { font-family: Cambria Math, serif; font-size: 1.1rem; opacity: 0; animation: fadeUp 0.8s ease-out 0.2s both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

        .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .section-label { font-family: Cambria Math, serif; color: #4a5568; font-size: 0.9rem; margin-bottom: 1.5rem; font-weight: 600; }

        /* ── BOOKINGS GRID ── */
        .bookings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.8rem;
        }
        .booking-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.09);
            border: 1px solid #e8edf5;
            transition: transform 0.28s, box-shadow 0.28s;
            display: flex; flex-direction: column;
        }
        .booking-card:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(26,54,93,0.15); }

        /* ── Category top stripe (3 categories) ── */
        .card-top { height: 7px; }
        .card-top.concerts  { background: linear-gradient(90deg,#553c9a,#b794f4); }
        .card-top.sports    { background: linear-gradient(90deg,#7b341e,#f6ad55); }
        .card-top.festivals { background: linear-gradient(90deg,#b7791f,#fbd38d); }

        .card-body { padding: 1.4rem 1.4rem 1rem; flex: 1; }
        .card-cat  { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #718096; margin-bottom: 0.4rem; }
        .card-title { font-size: 1.2rem; font-family: Cooper, serif; color: #1a365d; margin-bottom: 0.9rem; line-height: 1.35; }
        .card-details { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
        .card-details span { font-size: 0.875rem; font-family: Cambria Math, serif; color: #4a5568; }
        .card-meta-row { display: flex; align-items: center; gap: 1rem; font-size: 0.78rem; color: #a0aec0; font-family: Arial, sans-serif; margin-top: 0.4rem; }

        .card-footer {
            padding: 1rem 1.4rem 1.3rem;
            border-top: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .price-block .label  { font-size: 0.78rem; color: #a0aec0; margin-bottom: 4px; }
        .price-block .price  { font-size: 1.5rem; font-weight: 700; color: #1a365d; font-family: Cambria Math, serif; }
        .price-block .seats  { font-size: 0.82rem; color: #718096; font-family: Cambria Math, serif; margin-top: 2px; }
        .right-block { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; font-family: Arial, sans-serif; text-transform: capitalize; letter-spacing: 0.3px; }
        .badge-confirmed { background: #f0fff4; color: #276749; }
        .badge-cancelled { background: #fff5f5; color: #c53030; }
        .badge-pending   { background: #fefcbf; color: #b7791f; }

        .cancel-btn {
            padding: 0.5rem 1.1rem; background: #fff5f5; color: #c53030;
            border: 1.5px solid #fed7d7; border-radius: 0.4rem;
            cursor: pointer; font-size: 0.82rem; font-weight: 600;
            font-family: Cambria Math, serif; transition: all 0.22s; white-space: nowrap;
        }
        .cancel-btn:hover { background: #c53030; color: white; border-color: #c53030; }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; }
        .empty-icon  { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state h2 { font-family: Cooper, serif; font-size: 1.5rem; color: #1a365d; margin-bottom: 0.5rem; }
        .empty-state p  { font-family: Cambria Math, serif; color: #718096; margin-bottom: 1.5rem; }
        .browse-btn { display: inline-block; padding: 0.7rem 1.8rem; background: #1a365d; color: white; border-radius: 0.5rem; text-decoration: none; font-weight: 600; font-family: Cambria Math, serif; transition: background 0.25s; }
        .browse-btn:hover { background: #2b6cb0; }

        #toast { position: fixed; bottom: 28px; right: 28px; padding: 1rem 1.5rem; border-radius: 10px; font-family: Cambria Math, serif; font-size: 0.95rem; font-weight: 600; z-index: 1200; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .toast-success { background: #f0fff4; color: #276749; border-left: 4px solid #38a169; }
        .toast-error   { background: #fff5f5; color: #c53030; border-left: 4px solid #e53e3e; }
    </style>
</head>
<body>

    <script src="header.js"></script>

    <div class="page-hero">
        <h1>My Bookings</h1>
        <p>Track and manage all your event reservations</p>
    </div>

    <div class="main">
        <div class="section-label" id="booking-label">Loading your bookings...</div>
        <div class="bookings-grid" id="bookings-list"></div>
    </div>

    <div id="toast"></div>

    <script>
        function showToast(text, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.className = type === 'success' ? 'toast-success' : 'toast-error';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3500);
        }

        async function loadBookings() {
            const res  = await fetch('/my-bookings');
            const data = await res.json();
            const grid  = document.getElementById('bookings-list');
            const label = document.getElementById('booking-label');

            if (!data.success) {
                label.textContent = 'Error loading bookings.';
                showToast('❌ ' + (data.error || 'Could not load bookings.'), 'error');
                return;
            }
            if (!data.bookings || !data.bookings.length) {
                label.textContent = '0 bookings found';
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎟️</div>
                        <h2>No Bookings Yet</h2>
                        <p>You haven't booked any events yet.<br>Browse upcoming events and reserve your spot!</p>
                        <a href="event.html" class="browse-btn">Browse Events →</a>
                    </div>`;
                return;
            }
            label.textContent = `${data.bookings.length} booking${data.bookings.length !== 1 ? 's' : ''} found`;
            grid.innerHTML = data.bookings.map(b => {
                const dateStr  = new Date(b.event_date).toLocaleDateString('en-IN', {weekday:'short', day:'2-digit', month:'short', year:'numeric'});
                const bookedOn = new Date(b.booked_at).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
                const cat      = (b.category || '').toLowerCase();
                const icon     = b.category_icon || '🎟️';
                return `
                <div class="booking-card">
                    <div class="card-top ${cat}"></div>
                    <div class="card-body">
                        <div class="card-cat">${icon} ${b.category || ''}</div>
                        <div class="card-title">${b.title}</div>
                        <div class="card-details">
                            <span>📅 ${dateStr} &nbsp;·&nbsp; ⏰ ${b.event_time}</span>
                            <span>📍 ${b.venue}</span>
                        </div>
                        <div class="card-meta-row">
                            <span>🔖 Booking #${b.booking_id}</span>
                            <span>📆 Booked on ${bookedOn}</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="price-block">
                            <div class="label">Total Amount</div>
                            <div class="price">₹${parseFloat(b.total_amount).toLocaleString('en-IN')}</div>
                            <div class="seats">🎫 ${b.seats_booked} seat${b.seats_booked > 1 ? 's' : ''} booked</div>
                        </div>
                        <div class="right-block">
                            <span class="badge badge-${b.booking_status}">${b.booking_status}</span>
                            ${b.booking_status === 'confirmed'
                                ? `<button class="cancel-btn" onclick="cancelBooking(${b.booking_id})">Cancel Booking</button>`
                                : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function cancelBooking(id) {
            if (!confirm('Are you sure you want to cancel this booking?')) return;
            const res  = await fetch(`/bookings/${id}/cancel`, { method: 'PUT' });
            const data = await res.json();
            if (data.success) { showToast('✅ Booking cancelled successfully.'); loadBookings(); }
            else showToast('❌ ' + (data.message || 'Could not cancel booking.'), 'error');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res  = await fetch('/session-info');
                const data = await res.json();
                if (!data.loggedIn || data.user.role !== 'customer') {
                    document.getElementById('booking-label').textContent = 'Please login to view bookings.';
                    showToast('Please login as a customer first.', 'error');
                    setTimeout(() => window.location = '/finallogin.html', 1500);
                    return;
                }
                await loadBookings();
            } catch(e) {
                showToast('❌ Could not connect to server. Is Node.js running?', 'error');
                document.getElementById('booking-label').textContent = 'Connection error.';
            }
        });
    </script>
</body>
</html>

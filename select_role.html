<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - EventSpark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        .role-selection { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6rem 2rem 2rem; background: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url('homebac.jpeg'); background-size: cover; background-position: center; color: white; text-align: center; }
        .role-selection h1 { font-size: 2.5rem; font-family: Cooper, serif; margin-bottom: 1rem; animation: fadeIn 0.8s ease-out both; }
        .role-selection > p { font-size: 1.1rem; font-family: Cambria Math, serif; margin-bottom: 3rem; opacity: 0; animation: fadeIn 0.8s ease-out 0.2s both; }
        .role-cards { display: flex; gap: 2rem; opacity: 0; animation: fadeIn 0.8s ease-out 0.4s both; }
        .role-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 2.5rem 2rem; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); width: 280px; text-decoration: none; color: white; transition: transform 0.3s, background 0.3s; }
        .role-card:hover { transform: translateY(-6px); background: rgba(255,255,255,0.2); }
        .role-card .icon { font-size: 3rem; margin-bottom: 1rem; }
        .role-card h2 { font-size: 1.4rem; font-family: Cooper, serif; margin-bottom: 0.8rem; }
        .role-card p  { font-size: 0.95rem; font-family: Cambria Math, serif; opacity: 0.9; margin: 0; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @media (max-width: 768px) { .role-cards { flex-direction: column; width: 100%; } .role-card { width: 100%; } }
    </style>
</head>
<body>

    <script src="header.js"></script>

    <div class="role-selection">
        <h1>Welcome to EventSpark</h1>
        <p>Please select your role to get started</p>
        <div class="role-cards">
            <a href="customerR.html" class="role-card">
                <div class="icon">🎟️</div>
                <h2>I am a Customer</h2>
                <p>Browse and book amazing events near you</p>
            </a>
            <a href="mangerreg.html" class="role-card">
                <div class="icon">🎪</div>
                <h2>I am an Event Manager</h2>
                <p>Create and manage professional events</p>
            </a>
        </div>
    </div>

</body>
</html>
